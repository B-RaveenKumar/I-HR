<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office OTP Display - iHR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: #f5f7fb; }
        .otp-card { max-width: 760px; margin: 2rem auto; border-radius: 14px; box-shadow: 0 12px 30px rgba(20, 40, 80, 0.16); }
        .otp-display { font-size: 5rem; font-weight: 800; letter-spacing: 0.35rem; color: #0d6efd; line-height: 1; }
        .otp-box { min-height: 260px; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 12px; border: 1px solid #dee6f2; }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0"><i class="bi bi-123"></i> Office OTP Display</h4>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="backBtn"><i class="bi bi-arrow-left"></i> Back</button>
        </div>

        <div class="card otp-card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <div>
                    <div class="fw-bold">4-digit office OTP for staff request</div>
                    <small class="text-muted">Code rotates every {{ rotation_seconds }} seconds</small>
                </div>
                <button type="button" class="btn btn-primary btn-sm" id="refreshOtpBtn"><i class="bi bi-arrow-clockwise"></i> Refresh Now</button>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-8">
                        <div class="otp-box" id="otpHolder">
                            <div class="otp-display" id="officeOtp">----</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="small text-muted mb-1">Expires At</div>
                        <div class="fw-semibold" id="expiresAt">-</div>
                        <div class="small text-muted mt-2">Refresh In</div>
                        <div class="fw-semibold" id="countdownText">--s</div>
                        <hr>
                        <div class="small text-muted">Staff must enter this 4-digit code in staff OTP page before requesting personal OTP.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="adminExitPasswordModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-shield-lock"></i> Confirm Admin Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-2">Enter admin password to leave OTP display screen.</p>
                    <input type="password" id="adminExitPassword" class="form-control" placeholder="Admin password" autocomplete="current-password">
                    <div class="text-danger small mt-2" id="adminExitError" style="display:none;"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="confirmExitBtn">Verify and Back</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const rotationSeconds = Number("{{ rotation_seconds|default(30) }}");
        const backTarget = "{{ url_for('admin_dashboard') }}";
        let refreshTimer = null;
        let countdownTimer = null;
        let expiresAtMs = 0;
        let backModal = null;

        function updateCountdown() {
            const countdownEl = document.getElementById('countdownText');
            if (!countdownEl || !expiresAtMs) {
                if (countdownEl) countdownEl.textContent = '--s';
                return;
            }

            const remaining = Math.max(0, Math.ceil((expiresAtMs - Date.now()) / 1000));
            countdownEl.textContent = `${remaining}s`;
        }

        function startCountdown() {
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(updateCountdown, 1000);
            updateCountdown();
        }

        async function loadOfficeOtp() {
            try {
                const response = await fetch('/api/attendance/otp/office-issue', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason: 'admin_otp_display' })
                });
                const data = await response.json();
                if (!data.success) {
                    document.getElementById('officeOtp').textContent = '----';
                    document.getElementById('expiresAt').textContent = data.error || 'Unable to issue OTP';
                    return;
                }

                document.getElementById('officeOtp').textContent = String(data.office_otp || '----').padStart(4, '0');
                const expiresDate = new Date(data.expires_at);
                expiresAtMs = expiresDate.getTime();
                document.getElementById('expiresAt').textContent = expiresDate.toLocaleString();
                updateCountdown();
            } catch (err) {
                document.getElementById('officeOtp').textContent = '----';
                document.getElementById('expiresAt').textContent = 'Network error while generating office OTP';
                expiresAtMs = 0;
                updateCountdown();
            }
        }

        function startAutoRefresh() {
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(loadOfficeOtp, Math.max(30, Number(rotationSeconds || 30)) * 1000);
        }

        async function verifyPasswordAndBack() {
            const passwordInput = document.getElementById('adminExitPassword');
            const errorBox = document.getElementById('adminExitError');
            const confirmBtn = document.getElementById('confirmExitBtn');
            const password = (passwordInput.value || '').trim();

            errorBox.style.display = 'none';
            errorBox.textContent = '';

            if (!password) {
                errorBox.textContent = 'Password is required.';
                errorBox.style.display = 'block';
                passwordInput.focus();
                return;
            }

            confirmBtn.disabled = true;
            try {
                const response = await fetch('/api/admin/dynamic-qr/verify-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await response.json();
                if (!data.success) {
                    errorBox.textContent = data.error || 'Password verification failed.';
                    errorBox.style.display = 'block';
                    passwordInput.value = '';
                    passwordInput.focus();
                    return;
                }

                window.location.href = backTarget;
            } catch (err) {
                errorBox.textContent = 'Network error while verifying password.';
                errorBox.style.display = 'block';
            } finally {
                confirmBtn.disabled = false;
            }
        }

        document.getElementById('refreshOtpBtn').addEventListener('click', loadOfficeOtp);
        document.getElementById('backBtn').addEventListener('click', () => {
            document.getElementById('adminExitPassword').value = '';
            const errorBox = document.getElementById('adminExitError');
            errorBox.style.display = 'none';
            errorBox.textContent = '';
            backModal.show();
            setTimeout(() => document.getElementById('adminExitPassword').focus(), 200);
        });
        document.getElementById('confirmExitBtn').addEventListener('click', verifyPasswordAndBack);
        document.getElementById('adminExitPassword').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                verifyPasswordAndBack();
            }
        });

        backModal = new bootstrap.Modal(document.getElementById('adminExitPasswordModal'));
        loadOfficeOtp();
        startAutoRefresh();
        startCountdown();
    </script>
</body>
</html>
