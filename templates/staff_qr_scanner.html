<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance Scanner - iHR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: #f3f7ff; }
        .scan-card { max-width: 820px; margin: 2rem auto; border-radius: 14px; box-shadow: 0 14px 32px rgba(15, 36, 69, 0.15); }
        #reader { width: 100%; min-height: 280px; }
        .manual-box { font-family: monospace; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0"><i class="bi bi-camera"></i> Staff QR Attendance Scanner</h4>
            <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('staff_dashboard') }}"><i class="bi bi-arrow-left"></i> Back</a>
        </div>

        <div class="card scan-card">
            <div class="card-body p-4">
                <div class="alert alert-info py-2">Scan the live dynamic QR shown in school office. The token is time-sensitive and expires quickly.</div>

                <div id="reader" class="mb-3"></div>

                <div class="mb-3">
                    <label class="form-label">Manual token entry (mobile app fallback contract)</label>
                    <textarea id="manualToken" class="form-control manual-box" rows="3" placeholder="Paste token if camera scan is unavailable..."></textarea>
                    <div class="d-flex gap-2 mt-2">
                        <button class="btn btn-primary" id="submitManualToken"><i class="bi bi-check2-circle"></i> Submit Token</button>
                        <button class="btn btn-outline-secondary" id="startCameraBtn"><i class="bi bi-play-circle"></i> Start Camera</button>
                        <button class="btn btn-outline-danger" id="stopCameraBtn"><i class="bi bi-stop-circle"></i> Stop Camera</button>
                    </div>
                </div>

                <div id="scanResult"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script>
        const resultBox = document.getElementById('scanResult');
        const scanner = new Html5Qrcode('reader');
        let scanning = false;

        function showResult(message, ok = true) {
            resultBox.innerHTML = `<div class="alert ${ok ? 'alert-success' : 'alert-danger'} mb-0">${message}</div>`;
        }

        async function sendToken(token) {
            if (!token) {
                showResult('Token is required', false);
                return;
            }
            try {
                const response = await fetch('/api/attendance/qr/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, client: 'staff-web' })
                });
                const data = await response.json();
                if (!data.success) {
                    showResult(data.error || 'Verification failed', false);
                    return;
                }
                showResult(data.message || 'Attendance marked');
            } catch (err) {
                showResult('Network error while verifying QR token', false);
            }
        }

        async function startScanner() {
            if (scanning) return;
            try {
                await scanner.start(
                    { facingMode: 'environment' },
                    { fps: 10, qrbox: { width: 260, height: 260 } },
                    async (decodedText) => {
                        if (!decodedText) return;
                        await sendToken(decodedText.trim());
                    }
                );
                scanning = true;
            } catch (err) {
                showResult('Unable to access camera. Use manual token input.', false);
            }
        }

        async function stopScanner() {
            if (!scanning) return;
            try {
                await scanner.stop();
            } catch (err) {
                // ignore
            }
            scanning = false;
        }

        document.getElementById('submitManualToken').addEventListener('click', async () => {
            const token = document.getElementById('manualToken').value.trim();
            await sendToken(token);
        });
        document.getElementById('startCameraBtn').addEventListener('click', startScanner);
        document.getElementById('stopCameraBtn').addEventListener('click', stopScanner);

        startScanner();
    </script>
</body>
</html>
